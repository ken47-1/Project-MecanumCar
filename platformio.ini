; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
lib_deps = 
	adafruit/Adafruit Motor Shield V2 Library@^1.1.3
	edukits/UltraPing@^1.0.0
build_flags = 
	-I$PROJECT_PACKAGES_DIR/framework-arduino-avr/libraries/SPI/src

[env:uno_r4_minima]
platform = renesas-ra
board = uno_r4_minima
framework = arduino
monitor_speed = 9600
lib_deps = 
	adafruit/Adafruit Motor Shield V2 Library@^1.1.3
	edukits/UltraPing@^1.0.0
build_flags = 
	-I$PROJECT_PACKAGES_DIR/framework-arduino-renesas-ra/libraries/SPI/src
	-D BOARD_UNO_R4
